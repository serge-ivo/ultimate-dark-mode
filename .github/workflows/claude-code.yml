name: Claude Code

on:
  issues:
    types: [opened, labeled]
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

jobs:
  claude:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'site-override')) ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'new-site')) ||
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--allowedTools Edit,Write,Bash,Read,Glob,Grep"
          prompt: |
            REPO: ${{ github.repository }}
            EVENT: ${{ github.event_name }}
            ISSUE NUMBER: ${{ github.event.issue.number }}
            ISSUE TITLE: ${{ github.event.issue.title }}
            ISSUE BODY: ${{ github.event.issue.body }}
            ISSUE AUTHOR: ${{ github.event.issue.user.login }}
            ISSUE LABELS: ${{ join(github.event.issue.labels.*.name, ', ') }}

            You are working on the Ultimate Dark Mode Chrome extension.

            CRITICAL: Read CLAUDE.md FIRST — it contains all conventions, the color
            palette, the override rules, and a list of common mistakes that CRASH
            web apps. Do not generate CSS without reading it.

            ## Your Task

            You have been triggered by a GitHub issue. Read the issue details above.

            If the issue has a "site-override" or "new-site" label:

            1. Read CLAUDE.md fully — especially "Writing Site Override CSS" and
               "Common Mistakes to Avoid".
            2. Extract the site URL/domain from the issue body.
            3. Look at any screenshots and debug JSON in the issue body.
            4. Check existing overrides in `src/content/overrides/` for examples.
            5. Generate a site-specific CSS override file at:
                 src/content/overrides/{basedomain}.css
            6. IMPORTANT: For complex apps (Google Sheets, Notion, Slack, Figma),
               only target the app "chrome" (toolbars, menus, sidebar). NEVER set
               colors on elements the app's JS manages — this crashes the app.
               See the "Critical Rules" section in CLAUDE.md.
            7. Commit the override file to a new branch.
            8. Create a PR linking back to the issue.
            9. Comment on the issue with a link to the PR.
