<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <span class="logo">&#9789;</span>
      <span class="title">Dark Mode</span>
    </div>
    <div class="domain" id="domain-name">...</div>
    <div class="toggle-row">
      <label class="switch">
        <input type="checkbox" id="toggle">
        <span class="slider"></span>
      </label>
      <span class="label" id="toggle-label">Off</span>
    </div>
    <div class="status" id="status"></div>
    <div class="report-row">
      <a href="#" id="report-issue" class="report-link">Report issue on this site</a>
      <span class="report-status" id="report-status"></span>
    </div>
    <div class="debug-log" id="debug-log"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
